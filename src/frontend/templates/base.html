<!doctype html>
<html class="no-js" lang="en">
<head>
  {% block head %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NVDA Add-on Store</title>
  <link rel="stylesheet" href="{{ url_for('frontend.static', filename='css/style.css') }}" type="text/css">
  <link rel="icon" href="{{ url_for('frontend.static', filename='images/nvda.ico') }}" type="image/x-icon">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@latest/dist/turbo.es2017-esm.min.js"></script>
  {% endblock %}
</head>
<body>
  <header>
    <h1>NVDA Add-on Store</h1>
  </header>
  <main id="content">
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>Copyright &copy; {{ COPYRIGHT_YEARS }} <a href="https://nvaccess.org">NV Access Limited</a>.</p>
  </footer>
  <div id="statusContainer" class="sr-only" role="status" aria-atomic="true"></div>
  <script type="text/javascript" src="{{ url_for('frontend.static', filename='js/main.js') }}"></script>
</body>
</html>
